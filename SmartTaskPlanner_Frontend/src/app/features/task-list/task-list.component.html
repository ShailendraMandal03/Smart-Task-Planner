<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Task List</h2>
    <div class="w-25">
        <input type="text" class="form-control" placeholder="Search by title or category..." [(ngModel)]="searchTerm">
    </div>
</div>

<div class="card shadow-sm">
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead class="table-light">
                <tr>
                    <th>Title</th>
                    <th>Category</th>
                    <th>Type</th>
                    <th>Priority</th>
                    <th>Effort</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <!-- ── Skeleton rows shown on initial page load ───────────────────────
                 isInitialLoading is true from service init until the first API
                 response arrives. Each td gets an animated shimmer placeholder.
                 ──────────────────────────────────────────────────────────────── -->
            <tbody *ngIf="isInitialLoading">
                <tr *ngFor="let i of [1,2,3,4,5]">
                    <td><span class="skeleton-cell long"></span></td>
                    <td><span class="skeleton-cell short"></span></td>
                    <td><span class="skeleton-cell medium"></span></td>
                    <td><span class="skeleton-cell short"></span></td>
                    <td><span class="skeleton-cell short"></span></td>
                    <td><span class="skeleton-cell medium"></span></td>
                    <td><span class="skeleton-cell medium"></span></td>
                </tr>
            </tbody>

            <tbody *ngIf="!isInitialLoading && (filteredTasks$ | async) as tasks">
                <tr *ngFor="let task of tasks">
                    <td>
                        <a [routerLink]="['/tasks/view', task.id]" class="text-decoration-none fw-bold">{{ task.title }} - {{ task.id }}</a>
                    </td>
                    <td>{{ task.category || '-' }}</td>
                    <td>{{ TaskType[task.type] }}</td>
                    <td>
                        <span class="badge" 
                              [class.bg-danger]="task.priority === Priority.High"
                              [class.bg-warning]="task.priority === Priority.Medium"
                              [class.bg-info]="task.priority === Priority.Low">
                            {{ Priority[task.priority] }}
                        </span>
                    </td>
                    <td>{{ task.estimatedEffort }}</td>
                    <td>
                        <span class="badge bg-secondary">{{ TaskStatus[task.status] }}</span>
                    </td>
                    <td>
                        <a [routerLink]="['/tasks/edit', task.id]" class="btn btn-sm btn-outline-primary me-2">Edit</a>
                        <button class="btn btn-sm btn-outline-danger" (click)="deleteTask(task.id)">Delete</button>
                    </td>
                </tr>
                <tr *ngIf="tasks.length === 0">
                    <td colspan="7" class="text-center py-4 text-muted">No tasks found. Create one to get started!</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<div class="d-flex justify-content-center mt-3" *ngIf="!searchTerm && hasNextPage">
    <button class="btn btn-primary" (click)="loadMore()" [disabled]="isPageLoading">
        <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true" *ngIf="isPageLoading"></span>
        {{ isPageLoading ? 'Loading...' : 'Load More Tasks' }}
    </button>
</div>


<app-confirm-modal></app-confirm-modal>
