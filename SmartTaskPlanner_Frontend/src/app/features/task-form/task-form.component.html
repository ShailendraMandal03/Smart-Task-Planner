<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card shadow-sm">
      <div class="card-header bg-white">
        <h3 class="mb-0">{{ isEditMode ? 'Edit Task' : 'Create New Task' }}</h3>
      </div>
      <div class="card-body">
        
        <form [formGroup]="taskForm" (ngSubmit)="onSubmit()">
          
          <div class="mb-3">
            <label class="form-label">Title *</label>
            <input type="text" class="form-control" formControlName="title" 
                   [class.is-invalid]="taskForm.get('title')?.invalid && taskForm.get('title')?.touched">
            <div class="invalid-feedback">Title is required (max 200 chars).</div>
          </div>

          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" rows="3" formControlName="description"></textarea>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label">Type *</label>
              <select class="form-select" formControlName="type">
                <option *ngFor="let t of taskTypes" [value]="t.value">{{ t.label }}</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Category</label>
              <input type="text" class="form-control" formControlName="category">
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-4">
              <label class="form-label">Priority *</label>
              <select class="form-select" formControlName="priority">
                <option *ngFor="let p of priorities" [value]="p.value">{{ p.label }}</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label">Estimated Effort *</label>
              <input type="number" class="form-control" formControlName="estimatedEffort" min="1">
            </div>
            <div class="col-md-4" *ngIf="isEditMode">
              <label class="form-label">Status *</label>
              <select class="form-select" formControlName="status">
                <option *ngFor="let s of statuses" [value]="s.value">{{ s.label }}</option>
              </select>
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label">Dependencies (Tasks that must be completed before this one)</label>
            <select multiple class="form-select" formControlName="dependencies" style="height: 120px;">
              <option *ngFor="let t of allTasks" [value]="t.id">{{ t.title }} ({{ t.category }})</option>
            </select>
            <small class="text-muted">Hold Ctrl/Cmd to select multiple.</small>
          </div>

          <div class="d-flex justify-content-end gap-2">
            <button type="button" class="btn btn-outline-secondary" (click)="taskForm.reset()">Reset</button>
            <button type="submit" class="btn btn-primary" [disabled]="taskForm.invalid">
              {{ isEditMode ? 'Update Task' : 'Create Task' }}
            </button>
          </div>

        </form>

      </div>
    </div>
  </div>
</div>
