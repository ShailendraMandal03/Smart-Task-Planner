<div class="modal fade" id="confirmModal" tabindex="-1" aria-labelledby="confirmModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title" id="confirmModalLabel">
          <span class="text-danger me-2">⚠</span> Confirm Action
        </h5>
      </div>
      <div class="modal-body pt-2">
        <p class="text-muted mb-0">{{ modalService.message }}</p>
      </div>
      <div class="modal-footer border-0">
        <button
          type="button"
          class="btn btn-outline-secondary"
          id="confirmModalCancelBtn"
          (click)="modalService.cancel()">
          Cancel
        </button>
        <button
          type="button"
          class="btn btn-danger"
          id="confirmModalConfirmBtn"
          (click)="modalService.confirm()">
          Delete
        </button>
      </div>
    </div>
  </div>
</div>

<div class="modal-backdrop fade show" *ngIf="isVisible"></div>
